version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: autoinsight_db
    environment:
      POSTGRES_USER: autoinsight_user
      POSTGRES_PASSWORD: autoinsight_password
      POSTGRES_DB: autoinsight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
